services:
  vote:
    image: dockersamples/examplevotingapp_vote
    depends_on:
      redis:
        condition: service_healthy 
    ports:
      - "8080:80"
    networks:
      - front-tier
      - back-tier
    labels:
      env: benchmark

  result:
    image: dockersamples/examplevotingapp_result
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8081:80"
    networks:
      - front-tier
      - back-tier
    labels:
      env: benchmark

  worker:
    image: dockersamples/examplevotingapp_worker
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy 
    networks:
      - back-tier
    labels:
      env: benchmark

  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: "5s"
      timeout: 3s
      retries: 5
    networks:
      - back-tier
    labels:
      env: benchmark

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: "5s"
      timeout: 5s
      retries: 5
    networks:
      - back-tier
    labels:
      env: benchmark

volumes:
  db-data:

networks:
  front-tier:
  back-tier: